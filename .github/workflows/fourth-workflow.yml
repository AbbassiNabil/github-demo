name: Second Workflow
on: push
jobs:
  # test:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Get code
  #       uses: actions/checkout@v6
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          start: npm run dev
          wait-on: "http://localhost:5173"
      # - name: Cache dependencies
      #   id: cache
      #   uses: actions/cache@v4
      #   with:
      #     path: |
      #       node_modules
      #       ~/.cache/Cypress
      #     key: npm-dep-${{ hashFiles('**/package-lock.json') }}
      # - name: Get dependencies
      #   if: steps.cache.outputs.cache-hit != 'true'
      #   run: npm ci
      # - name: Get dependencies
      #   run: npm ci
      # - name: Lint code
      #   run: npm run lint
      # - name: List content
      #   run: ls -al
      # - name: Run the server
      #   run: npm run dev < /dev/null & npx wait-on "http://localhost:5173" --timeout 10s
      # - name: Cypress Tests
      #   run: npx cypress run
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4
      - name: Cache dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/Cypress
          key: npm-dep-${{ hashFiles('**/package-lock.json') }}
      - name: Get dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Get dependencies
        run: npm ci
      - name: Build the app
        run: npm run build
      - name: Detail content
        id: publish-bom
        run: |
          echo 'bom_list<<EOF' >> $GITHUB_OUTPUT
          find dist -name '*.js' -exec echo '{}' \; >> $GITHUB_OUTPUT
          echo EOF >> $GITHUB_OUTPUT
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: my-app
          path: dist
  deploy:
    needs: [build, lint]
    uses: ./.github/workflows/deploy.yml
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4
      - name: Cache dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-dep-${{ hashFiles('**/package-lock.json') }}
      - name: Get dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Build the app
        run: npm run lint
